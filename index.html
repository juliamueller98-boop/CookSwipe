<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CookSwipe" />
  <meta name="theme-color" content="#23170f" />
  <title>CookSwipe</title>
  <style>
    :root {
      --bg: #f7efe6;
      --bg-soft: #fbf6f0;
      --card: rgba(255,255,255,0.78);
      --card-strong: rgba(255,255,255,0.92);
      --text: #25170f;
      --muted: #78685d;
      --line: rgba(93, 60, 38, 0.12);
      --accent: #a4572a;
      --accent-2: #d38753;
      --accent-3: #6e8e54;
      --shadow: 0 20px 50px rgba(57, 33, 19, 0.14);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(211,135,83,0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(110,142,84,0.12), transparent 25%),
        linear-gradient(180deg, #f8f1e9, #f4ece2 40%, #f8f2eb);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      padding:
        calc(env(safe-area-inset-top, 0px) + 14px)
        14px
        calc(env(safe-area-inset-bottom, 0px) + 28px)
        14px;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .glass {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(52,30,18,0.08));
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 250px;
      display: block;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      position: relative;
      z-index: 3;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(255,255,255,0.28);
      color: rgba(75,48,31,0.92);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 18px rgba(57,33,19,0.08);
    }

    .hero-badge {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.36);
      color: rgba(75,48,31,0.92);
      border: 1px solid rgba(255,255,255,0.3);
      font-size: 0.8rem;
      font-weight: 800;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 18px rgba(57,33,19,0.08);
    }

    .hero-copy { display: none; }

    
    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 22px 18px 18px;
      position: relative;
      z-index: 2;

    .hero-title { display: none; }

    .subtitle { display: none; }

    .hero-art::before {
      content: "";
      position: absolute;
      inset: auto 16px 18px auto;
      width: 110px;
      height: 110px;
      border-radius: 26px;
      background: rgba(255,255,255,0.16);
      transform: rotate(12deg);

    .hero-art::after {
      content: "";
      position: absolute;
      inset: 20px auto auto 20px;
      width: 74px;
      height: 74px;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      transform: rotate(-10deg);

    .hero-people { display: none; }

    .tabs-wrap {
      padding: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.76), rgba(255,255,255,0.62));
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-items: center;
    }

    .tab {
      border: none;
      min-height: 46px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,250,244,0.95), rgba(248,240,230,0.96));
      color: #5f4739;
      font-weight: 800;
      font-size: 0.86rem;
      letter-spacing: -0.02em;
      cursor: pointer;
      padding: 0 8px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.65),
        0 8px 20px rgba(84, 52, 34, 0.08);
    }

    .tab.active {
      background: linear-gradient(180deg, #fff6ed, #f5e8da);
      color: #8e5330;
      box-shadow:
        inset 0 0 0 1px rgba(202,152,116,0.18),
        0 10px 22px rgba(84, 52, 34, 0.1);

    .panel {
      padding: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .section-sub {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;

    .filters::-webkit-scrollbar { display: none; }

    .filter-chip {
      border: none;
      padding: 11px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      color: var(--muted);
      box-shadow: inset 0 0 0 1px rgba(93,60,38,0.08);
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .filter-chip.active {
      background: linear-gradient(135deg, rgba(164,87,42,0.16), rgba(211,135,83,0.2));

      box-shadow: inset 0 0 0 1px rgba(164,87,42,0.16);
    }

    .card-shell {
      padding: 10px 10px 16px;
    }

    .card-stack {
      position: relative;
      height: 635px;
      margin-bottom: 12px;
    }

    .recipe-card {
      position: absolute;
      inset: 0;
      border-radius: 34px;
      overflow: hidden;
      background: var(--card-strong);
      box-shadow: 0 18px 36px rgba(57,33,19,0.14);
      border: 1px solid rgba(255,255,255,0.76);
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
      will-change: transform;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .recipe-card.back {
      transform: scale(0.973) translateY(8px);
      opacity: 0.8;
    }

    .recipe-card.back2 {
      transform: scale(0.946) translateY(16px);
      opacity: 0.58;
    }

    .card-image {
      position: relative;
      height: 45%;
      background: #efe7dd;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(21,12,7,0.08), rgba(21,12,7,0.28));
      pointer-events: none;
    }

    .corner-meta {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .swipe-mark {
      position: absolute;
      top: 18px;
      padding: 10px 14px;
      border-radius: 16px;
      border: 3px solid;
      background: rgba(255,255,255,0.78);
      font-size: 0.98rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      opacity: 0;
      z-index: 3;
      transition: opacity 0.15s ease;
    }

    .swipe-mark.right {
      left: 16px;
      color: #2f6e3e;
      border-color: #2f6e3e;
      transform: rotate(-8deg);
    }

    .swipe-mark.left {
      right: 16px;
      color: #a4572a;
      border-color: #a4572a;
      transform: rotate(8deg);
    }

    .card-body {
      padding: 18px 18px 20px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(164,87,42,0.08);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .title {
      margin: 0;
      font-size: 1.6rem;
      line-height: 1.03;
      letter-spacing: -0.05em;
      font-weight: 900;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.48;
    }

    .nutrition {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .nutri {
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(246,240,234,0.95));
      border-radius: 20px;
      padding: 12px 8px;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(93,60,38,0.06);
    }

    .nutri-value {
      font-size: 1.04rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .nutri-label {
      margin-top: 6px;
      font-size: 0.69rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
    }

    .nutri.protein {
      background: linear-gradient(180deg, rgba(228,245,228,0.96), rgba(237,250,237,0.96));
    }

    .nutri.protein .nutri-value {
      color: #2f6e3e;
    }

    .teaser {
      padding: 13px 14px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(164,87,42,0.09), rgba(211,135,83,0.12));
      color: #71472d;
      font-size: 0.92rem;
      line-height: 1.42;
      box-shadow: inset 0 0 0 1px rgba(164,87,42,0.08);
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 10px;
    }

    .action-btn {
      border: none;
      min-height: 52px;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      box-shadow: var(--shadow);
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
    }

    .action-btn.center {
      background: linear-gradient(135deg, #9e5429, #d38d5a);
      color: white;
    }

    .list-grid {
      display: grid;
      gap: 10px;
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      min-height: 54px;
      border-radius: 18px;
      padding: 0 16px;
      background: rgba(255,255,255,0.9);
      box-shadow: inset 0 0 0 1px rgba(93,60,38,0.08);
      font: inherit;
      color: var(--text);
    }

    .saved-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.82);
      box-shadow: inset 0 0 0 1px rgba(93,60,38,0.06);
    }

    .saved-name {
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .saved-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .mini-btn {
      border: none;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(164,87,42,0.1);
      color: var(--accent);
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(18,11,7,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
    }

    .modal.open { display: flex; }

    .sheet {
      width: 100%;
      max-width: 680px;
      max-height: 92vh;
      overflow: auto;
      border-radius: 30px 30px 0 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,246,241,0.98));
      box-shadow: 0 -20px 48px rgba(0,0,0,0.18);
      padding: 14px 14px calc(env(safe-area-inset-bottom, 0px) + 22px);
    }

    .sheet-handle {
      width: 54px;
      height: 5px;
      border-radius: 999px;
      background: rgba(120,104,93,0.3);
      margin: 6px auto 14px;
    }

    .sheet-image {
      width: 100%;
      height: 260px;
      border-radius: 24px;
      object-fit: cover;
      display: block;
      box-shadow: var(--shadow);
    }

    .sheet-head {
      display: grid;
      gap: 10px;
      padding: 14px 4px 2px;
    }

    .sheet-title {
      margin: 0;
      font-size: 1.8rem;
      line-height: 1.02;
      letter-spacing: -0.05em;
      font-weight: 900;
    }

    .sheet-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.48;
      font-size: 1rem;
    }

    .sheet-columns {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .recipe-section {
      padding: 16px;
      border-radius: 24px;
      background: rgba(255,255,255,0.84);
      box-shadow: inset 0 0 0 1px rgba(93,60,38,0.06);
    }

    .recipe-section h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: -0.02em;
      font-weight: 900;
    }

    ul.ingredients-list, ol.steps-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.55;
    }

    ul.ingredients-list li, ol.steps-list li {
      margin-bottom: 8px;
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .sheet-btn {
      border: none;
      min-height: 54px;
      border-radius: 18px;
      font-weight: 800;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .sheet-btn.primary {
      background: linear-gradient(135deg, #9e5429, #d38d5a);
      color: white;
    }

    .sheet-btn.secondary {
      background: rgba(164,87,42,0.1);
      color: var(--accent);
    }

    .footer-note {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
      text-align: center;
      padding-top: 2px;
    }

    @media (max-width: 520px) {
      .hero { min-height: 205px; background-position: center center; }
      .hero-inner { min-height: 205px; }
      .tabs { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; }
      .tab { min-height: 42px; font-size: 0.76rem; border-radius: 14px; padding: 0 4px; }
      .card-stack { height: 590px; }
      .card-shell { padding: 8px 8px 14px; }
      .recipe-card { border-radius: 28px; }
      .card-body { padding: 14px 14px 16px; gap: 10px; }
      .title { font-size: 1.34rem; }
      .desc { font-size: 0.92rem; line-height: 1.4; }
      .nutrition { grid-template-columns: repeat(2, 1fr); }
      .action-row { grid-template-columns: 1fr 1.1fr 1fr; gap: 8px; }
      .action-btn { min-height: 50px; border-radius: 18px; font-size: 0.9rem; }
      .sheet-image { height: 210px; }
      .sheet-title { font-size: 1.5rem; }
    }
  </style>
</head>

            'Alles ohne Deckel 15 bis 18 Minuten köcheln lassen und zwischendurch umrühren, bis die Orzo gar sind.',
            'Gouda unterheben, mit Salz und Pfeffer abschmecken.',
            'Mit Schmand und Basilikum servieren.'
          ],
          teaser: 'Schnell, würzig und sehr comfort-foodig.'
        }
      ],
      drinks: [
        {
          id: 'd1',
          title: 'Berry Protein Smoothie',
          category: 'drinks',
          tags: ['Vegetarisch', 'High Protein'],
          filterTags: ['vegetarian', 'protein'],
          time: '4 min',
          level: 'Easy',
          image: createRecipeArt('smoothie', 'Berry Protein Smoothie'),
          desc: 'Beeriger Smoothie mit Skyr, Banane und Proteinpulver – ideal als schneller Snack oder Frühstücksersatz.',
          nutrition: { kcal: 330, protein: 31, carbs: 29, fat: 7 },
          ingredients: [
            '150 g TK-Beeren',
            '1 Banane',
            '150 g Skyr',
            '20 g Vanille-Proteinpulver',
            '200 ml Milch oder Pflanzendrink'
          ],
          steps: [
            'Alle Zutaten in einen Mixer geben.',
            'Fein pürieren.',
            'Nach Wunsch mit mehr Flüssigkeit anpassen und kalt servieren.'
          ],
          teaser: 'Schnell gemacht und sehr proteinreich.'
        },
        {
          id: 'd2',
          title: 'Iced Matcha Coconut Latte',
          category: 'drinks',
          tags: ['Vegan', 'Fresh'],
          filterTags: ['vegan'],
          time: '6 min',
          level: 'Easy',
          image: createRecipeArt('matcha', 'Iced Matcha Coconut Latte'),
          desc: 'Kalter Matcha mit Kokosdrink und Eis – frisch, cremig und leicht süß.',
          nutrition: { kcal: 160, protein: 3, carbs: 13, fat: 10 },
          ingredients: [
            '2 TL Matcha',
            '60 ml heißes Wasser',
            '220 ml Kokosdrink',
            '1 TL Ahornsirup',
            'Eiswürfel'
          ],
          steps: [
            'Matcha mit heißem Wasser klümpchenfrei verrühren.',
            'Ein Glas mit Eis füllen.',
            'Kokosdrink eingießen und mit Matcha toppen.',
            'Nach Wunsch leicht süßen und servieren.'
          ],
          teaser: 'Leicht, frisch und wunderschön als Nachmittagspause.'
        }
      ]
    };

    let currentCategory = 'breakfast';
    let currentIndex = 0;
    let activeCardId = null;

    const tabsEl = document.getElementById('tabs');
    const cardStack = document.getElementById('cardStack');
    const savedList = document.getElementById('savedList');
    const recipeCount = document.getElementById('recipeCount');
    const modal = document.getElementById('recipeModal');
    const sheetContent = document.getElementById('sheetContent');
    const searchInput = document.getElementById('searchInput');
    const modalTopClose = document.getElementById('modalTopClose');

    function getAllRecipes() {
      return Object.values(RECIPES).flat();
    }

    function getCategoryRecipes() {
      return RECIPES[currentCategory] || [];
    }

    function currentRecipe() {
      const recipes = getCategoryRecipes();
      if (!recipes.length) return null;
      return recipes[currentIndex % recipes.length];
    }

    function updateSummary() {
      recipeCount.textContent = `${getAllRecipes().length} Rezepte`;
    }

    function renderTabs() {
      tabsEl.innerHTML = '';
      Object.entries(LABELS).forEach(([key, label]) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (key === currentCategory ? ' active' : '');
        btn.textContent = label;
        btn.addEventListener('click', () => {
          currentCategory = key;
          currentIndex = 0;
          renderTabs();
          renderStack();
        });
        tabsEl.appendChild(btn);
      });
    }


    function cardHtml(recipe) {
      return `
        <div class="swipe-mark right">OPEN</div>
        <div class="swipe-mark left">LATER</div>
        <div class="card-image">
          <div class="corner-meta">${LABELS[recipe.category]}</div>
          <img src="${recipe.image}" alt="${recipe.title}" />
        </div>
        <div class="card-body">
          <div class="meta-row">
            <span class="pill">${recipe.time}</span>
            <span class="pill">${recipe.level}</span>
            ${recipe.tags.map(tag => `<span class="pill">${tag}</span>`).join('')}
          </div>
          <h2 class="title">${recipe.title}</h2>
          <p class="desc">${recipe.desc}</p>
          <div class="nutrition">
            <div class="nutri"><div class="nutri-value">${recipe.nutrition.kcal}</div><div class="nutri-label">kcal</div></div>
            <div class="nutri protein"><div class="nutri-value">${recipe.nutrition.protein} g</div><div class="nutri-label">Eiweiß</div></div>
            <div class="nutri"><div class="nutri-value">${recipe.nutrition.carbs} g</div><div class="nutri-label">Carbs</div></div>
            <div class="nutri"><div class="nutri-value">${recipe.nutrition.fat} g</div><div class="nutri-label">Fett</div></div>
          </div>
          <div class="teaser">${recipe.teaser}</div>
        </div>
      `;
    }

    function buildCard(recipe, depth) {
      const card = document.createElement('article');
      card.className = 'recipe-card';
      if (depth === 1) card.classList.add('back');
      if (depth === 2) card.classList.add('back2');
      card.dataset.recipeId = recipe.id;
      card.innerHTML = cardHtml(recipe);
      if (depth === 0) attachSwipe(card, recipe);
      return card;
    }

    function renderStack() {
      activeCardId = null;
      updateSummary();
      const recipes = getCategoryRecipes();
      cardStack.innerHTML = '';
      if (!recipes.length) {
        cardStack.innerHTML = '<div style="padding:24px;color:var(--muted);">Keine Rezepte für diese Kombination gefunden.</div>';
        return;
      }

      const visible = [
        recipes[currentIndex % recipes.length],
        recipes[(currentIndex + 1) % recipes.length],
        recipes[(currentIndex + 2) % recipes.length]
      ].reverse();

      visible.forEach((recipe, idx) => {
        const depth = visible.length - 1 - idx;
        cardStack.appendChild(buildCard(recipe, depth));
      });
    }

    function nextRecipe() {
      const recipes = getCategoryRecipes();
      if (!recipes.length) return;
      currentIndex = (currentIndex + 1) % recipes.length;
      renderStack();
    }

    function animateAway(card, direction, callback) {
      card.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
      card.style.transform = `translateX(${direction * 430}px) rotate(${direction * 16}deg)`;
      card.style.opacity = '0';
      setTimeout(callback, 150);
    }

    function openRecipe(recipe) {
      if (!recipe) return;
      sheetContent.innerHTML = `
        <img class="sheet-image" src="${recipe.image}" alt="${recipe.title}" />
        <div class="sheet-head">
          <div class="meta-row">
            <span class="pill">${LABELS[recipe.category]}</span>
            <span class="pill">${recipe.time}</span>
            <span class="pill">${recipe.level}</span>
            ${recipe.tags.map(tag => `<span class="pill">${tag}</span>`).join('')}
          </div>
          <h2 class="sheet-title">${recipe.title}</h2>
          <p class="sheet-desc">${recipe.desc}</p>
          <div class="nutrition">
            <div class="nutri"><div class="nutri-value">${recipe.nutrition.kcal}</div><div class="nutri-label">kcal</div></div>
            <div class="nutri protein"><div class="nutri-value">${recipe.nutrition.protein} g</div><div class="nutri-label">Eiweiß</div></div>
            <div class="nutri"><div class="nutri-value">${recipe.nutrition.carbs} g</div><div class="nutri-label">Carbs</div></div>
            <div class="nutri"><div class="nutri-value">${recipe.nutrition.fat} g</div><div class="nutri-label">Fett</div></div>
          </div>
        </div>
        <div class="sheet-columns">
          <section class="recipe-section">
            <h3>Zutaten für 2 Personen</h3>
            <ul class="ingredients-list">
              ${recipe.ingredients.map(item => `<li>${item}</li>`).join('')}
            </ul>
          </section>
          <section class="recipe-section">
            <h3>Schritt für Schritt</h3>
            <ol class="steps-list">
              ${recipe.steps.map(item => `<li>${item}</li>`).join('')}
            </ol>
          </section>
        </div>
        <div class="sheet-actions">
          <button class="sheet-btn secondary" id="closeSheetBtn">Schließen</button>
          <button class="sheet-btn primary" id="nextSheetBtn">Weiter</button>
        </div>
      `;
      modal.classList.add('open');
      const sheet = modal.querySelector('.sheet');
      sheet.scrollTop = 0;
      document.getElementById('closeSheetBtn').addEventListener('click', closeModal);
      document.getElementById('nextSheetBtn').addEventListener('click', () => {
        closeModal();
        nextRecipe();
      });
    }

    function closeModal() {
      modal.classList.remove('open');
    }

    function attachSwipe(card, recipe) {
      const rightMark = card.querySelector('.swipe-mark.right');
      const leftMark = card.querySelector('.swipe-mark.left');
      let startX = 0;
      let currentX = 0;
      let dragging = false;
      let moved = false;

      const reset = () => {
        card.style.transition = 'transform 0.22s ease';
        card.style.transform = 'translateX(0) rotate(0deg)';
        rightMark.style.opacity = '0';
        leftMark.style.opacity = '0';
      };

      const start = (x) => {
        if (activeCardId && activeCardId !== recipe.id) return;
        activeCardId = recipe.id;
        dragging = true;
        moved = false;
        startX = x;
        currentX = x;
        card.style.transition = 'none';
      };

      const move = (x) => {
        if (!dragging) return;
        currentX = x;
        const dx = currentX - startX;
        if (Math.abs(dx) > 10) moved = true;
        card.style.transform = `translateX(${dx}px) rotate(${dx * 0.05}deg)`;
        rightMark.style.opacity = String(Math.max(0, dx / 90));
        leftMark.style.opacity = String(Math.max(0, -dx / 90));
      };

      const end = () => {
        if (!dragging) return;
        dragging = false;
        activeCardId = null;
        const dx = currentX - startX;
        if (dx > 95) {
          animateAway(card, 1, () => {
            renderStack();
            openRecipe(recipe);
          });
        } else if (dx < -95) {
          animateAway(card, -1, () => {
            nextRecipe();
          });
        } else {
          reset();
          if (!moved) openRecipe(recipe);
        }
      };

      card.addEventListener('touchstart', e => {
        if (e.touches && e.touches[0]) start(e.touches[0].clientX);
      }, { passive: true });
      card.addEventListener('touchmove', e => {
        if (e.touches && e.touches[0]) move(e.touches[0].clientX);
      }, { passive: true });
      card.addEventListener('touchend', end);
      card.addEventListener('touchcancel', end);

      card.addEventListener('pointerdown', e => start(e.clientX));
      card.addEventListener('pointermove', e => move(e.clientX));
      card.addEventListener('pointerup', end);
      card.addEventListener('pointercancel', end);

      card.addEventListener('click', (e) => {
        if (!dragging && !moved && e.detail === 1) {
          openRecipe(recipe);
        }
      });
    }

    function renderSaved() {
      const all = getAllRecipes();
      const query = (searchInput.value || '').trim().toLowerCase();
      const filtered = !query ? all : all.filter(recipe =>
        recipe.title.toLowerCase().includes(query) ||
        recipe.category.toLowerCase().includes(query) ||
        recipe.tags.join(' ').toLowerCase().includes(query) ||
        recipe.ingredients.join(' ').toLowerCase().includes(query)
      );
      savedList.innerHTML = '';
      if (!filtered.length) {
        savedList.innerHTML = '<div style="padding:16px;border-radius:18px;background:rgba(255,255,255,0.82);color:var(--muted);">Kein passendes Gericht gefunden.</div>';
        return;
      }
      filtered.forEach(recipe => {
        const item = document.createElement('div');
        item.className = 'saved-item';
        item.innerHTML = `
          <div>
            <div class="saved-name">${recipe.title}</div>
            <div class="saved-meta">${LABELS[recipe.category]} · ${recipe.nutrition.protein} g Eiweiß · ${recipe.time}</div>
          </div>
        `;
        const btn = document.createElement('button');
        btn.className = 'mini-btn';
        btn.textContent = 'Öffnen';
        btn.addEventListener('click', () => openRecipe(recipe));
        item.appendChild(btn);
        savedList.appendChild(item);
      });
    }

    document.getElementById('laterBtn').addEventListener('click', nextRecipe);
    document.getElementById('openBtn').addEventListener('click', () => openRecipe(currentRecipe()));
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      const recipes = getCategoryRecipes();
      if (!recipes.length) return;
      currentIndex = Math.floor(Math.random() * recipes.length);
      renderStack();
    });
    searchInput.addEventListener('input', renderSaved);

    modalTopClose.addEventListener('click', closeModal);

    modal.addEventListener('click', e => {
      if (e.target === modal) closeModal();
    });

    renderTabs();
    renderStack();
    renderSaved();
  </script>
</body>
</html>
